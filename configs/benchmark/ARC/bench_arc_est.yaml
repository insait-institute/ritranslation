task: "BENCHMARK"
output_dir: "src/benchmark/data"
translation_model:
  name: "google/gemini-2.0-flash-001"
  provider: "openrouter"
judge_model:
  name: "google/gemini-2.0-flash-001"
  provider: "openrouter"
task_config:
  benchmark: 
    name: "allenai/ai2_arc"
    subset: ["ARC-Challenge"]
    split: ["train", "validation", "test"]
  target_language: "Estonian"
  method: "USI" # SC, USI, TRANK, BoN
  temperature_translator: 0.3
  temperature_judge: 0.1
  max_workers: True
  num_workers: 1
  n_samples: 1
  question_fields: ["question"]
  answer_fields: ["choices.text"]
  agent_check: False
  few_shot: False
  multi_prompt: True
  save_to_hf: True
  prompt_files: ["example_base_1.txt", "example_base_2.txt", "estonian/example_base_1_est.txt", "estonian/example_base_2_est.txt"]

