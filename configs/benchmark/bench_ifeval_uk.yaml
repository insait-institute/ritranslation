task: "BENCHMARK"
output_dir: "src/benchmark/data"
translation_model:
  name: "gpt-4o-mini-2024-07-18"
  provider: "openai"
  args: {
    reasoning_level: "low"
  }
judge_model:
  name: "gpt-4o-mini-2024-07-18"
  provider: "openai"
  args: {
    reasoning_level: "low"
  }
task_config:
  benchmark: 
    name: "cais/mmlu"
    subset: ["high_school_computer_science"]
    split: ["test"]
  target_language: "German" # "Ukrainian"
  method: "TRANK" # SC, USI, TRANK, BoN
  max_workers: False
  num_workers: 1
  n_samples: 1
  question_fields: ["question"]
  answer_fields: ["choices"]
  agent_check: False
  few_shot: True
  multi_prompt: True
  prompt_files: ["example_base_1.txt", "example_base_2.txt", "ukrainian/example_base_1_ukr.txt", "ukrainian/example_base_2_ukr.txt"]

