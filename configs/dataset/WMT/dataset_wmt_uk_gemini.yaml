task: "DATASET"
output_dir: "src/dataset/data/wmt/uk"
translation_model:
  name: "google/gemini-2.0-flash-001"
  provider: "openrouter"
judge_model:
  name: "google/gemini-2.0-flash-001"
  provider: "openrouter"
task_config:
  dataset: 
    name: "google/wmt24pp"
    subset: ["en-uk_UA"]
    split: ["train"]
    # n_entries: 700
  target_language: "Ukrainian"
  method: "BoN" # SC, USI, TRANK, BoN
  temperature_translator: 0.7
  temperature_judge: 0.1
  max_workers: True
  num_workers: 10
  n_samples: 1
  fields: ["source"]
  agent_check: False
  few_shot: False
  multi_prompt: True
  save_to_hf: False
  prompt_files: ["example_base_1.txt", "example_base_2.txt", "example_base_3.txt", "ukrainian/example_base_1_ukr.txt", "ukrainian/example_base_2_ukr.txt"]

  
