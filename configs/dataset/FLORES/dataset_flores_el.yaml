task: "DATASET"
output_dir: "src/dataset/data/flores/el"
translation_model:
  name: "gpt-4o-mini-2024-07-18"
  provider: "openai"
  args: {
    reasoning_level: "low"
  }
judge_model:
  name: "gpt-4o-mini-2024-07-18"
  provider: "openai"
  args: {
    reasoning_level: "low"
  }
task_config:
  dataset: 
    name: "gsarti/flores_101"
    subset: ["eng"]
    split: ["devtest"]
  target_language: "Greek"
  method: "TRANK" # SC, USI, TRANK, BoN
  max_workers: True
  num_workers: 70
  n_samples: 5
  fields: ["sentence"]
  agent_check: True
  few_shot: False
  multi_prompt: False
  prompt_files: ["example_base_1.txt", "example_base_2.txt", "example_base_3.txt", "greek/example_base_1_gr.txt", "greek/example_base_2_gr.txt"]

  
